<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>도서 목록</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body>

<div class="container py-4">
    <header class="pb-3 mb-4 border-bottom">
        <div class="d-flex align-items-center">
            <a th:href="@{/home}" class="d-flex align-items-center text-body-emphasis text-decoration-none me-auto">
                <img th:src="@{/imgs/book_icon.png}" width="40" height="40" class="me-2">
                <span class="fs-4">BookMarket</span>
            </a>
            <nav>
                <a th:href="@{/books/문학}" class="nav-link d-inline">문학</a>&nbsp;&nbsp;
                <a th:href="@{/books/동양철학}" class="nav-link d-inline">동양철학</a>
                <a th:href="@{/books/우주과학}" class="nav-link d-inline">우주과학</a>
            </nav>
        </div>
    </header>

    <div class="p-5 mb-4 bg-body-tertiary rounded-3">
        <div class="container-fluid py-5">
            <h1 class="display-5 fw-bold">도서 목록</h1>
            <p class="col-md-8 fs-4">BookMarket</p>
        </div>
    </div>

    <div class="row align-items-md-stretch text-center">
        <div class="col-md-4 mb-4" th:each="book : ${bookList}">
            <div class="h-100 p-3 border rounded-3">
                <img th:src="@{/imgs/book_icon.png} "width="50" height="50"/>

                <h3 th:text="${book.name}">도서명</h3>
                <p th:text="${book.author}"></p>
                <p th:text="${book.publisher} + ' | ' + ${book.releaseDate}"></p>
                <p align="left" th:text="${book.description}"></p>
                <p th:text="${book.unitPrice} + '원'"></p>
                <p>
                    <a th:href="@{/books/book(id=${book.bookId})}" class="btn btn-secondary" role="button">
                        상세정보 &raquo;
                    </a>
                </p>
            </div>
        </div> </div> <footer class="pt-3 mt-4 text-body-secondary border-top">
    &copy; BookMarket
</footer>
</div>
</body>
</html>
